<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Product</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
  <a class="navbar-brand fw-bold" href="/">ElectroStore — Admin</a>
  <a href="/admin" class="btn btn-outline-light btn-sm">Back to Admin</a>
</nav>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm p-4">
        <h5 class="mb-4">Edit Product</h5>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input type="text" name="name" class="form-control" value="{{ product.name }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select name="category" id="edit-category-select" class="form-select"
              onchange="toggleEditNewCategory(this)" required>
              {% for cat in categories %}
              <option value="{{ cat }}" {% if cat == product.category %}selected{% endif %}>{{ cat }}</option>
              {% endfor %}
              <option value="__new__">+ Add New Category</option>
            </select>
          </div>
          <div class="mb-3" id="edit-new-category-box" style="display:none;">
            <label class="form-label">New Category Name</label>
            <input type="text" name="new_category" id="edit_new_category" class="form-control" placeholder="Enter new category">
          </div>
          <div class="mb-3">
            <label class="form-label">Price (Rs)</label>
            <input type="number" name="price" class="form-control" value="{{ product.price }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Stock</label>
            <input type="number" name="stock" class="form-control" value="{{ product.stock }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Image URL</label>
            <input type="text" name="image" class="form-control" value="{{ product.image }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3" required>{{ product.description }}</textarea>
          </div>
          <button type="submit" class="btn btn-dark w-100">Save Changes</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  function toggleEditNewCategory(select) {
    const box = document.getElementById('edit-new-category-box');
    const input = document.getElementById('edit_new_category');
    if (select.value === '__new__') {
      box.style.display = 'block';
      input.required = true;
    } else {
      box.style.display = 'none';
      input.required = false;
    }
  }
</script>

</body>
</html>
